name: Daily NUMMUS Snapshot

on:
  schedule:
    # 06:00 UTC, currently 08:00 in Italy during daylight saving time.
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect daily snapshot
        run: npm run collect
        env:
          HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}

      - name: Build dashboard
        run: npm run build

      - name: Commit snapshot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update daily NUMMUS snapshot"
          file_pattern: data/history.json data/snapshots/*.json
